{% extends "layout.html" %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold py-3">
                    <i class="bi bi-person-circle me-2"></i> My Account
                </div>
                <div class="list-group list-group-flush">
                    <a href="{{ url_for('account.dashboard') }}" class="list-group-item list-group-item-action {% if request.endpoint == 'account.dashboard' %}active{% endif %}">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                    <a href="{{ url_for('account.orders') }}" class="list-group-item list-group-item-action {% if 'orders' in request.endpoint %}active{% endif %}">
                        <i class="bi bi-bag me-2"></i> My Orders
                    </a>
                    <a href="{{ url_for('account.addresses') }}" class="list-group-item list-group-item-action {% if 'addresses' in request.endpoint %}active{% endif %}">
                        <i class="bi bi-geo-alt me-2"></i> Addresses
                    </a>
                    <a href="{{ url_for('account.profile') }}" class="list-group-item list-group-item-action {% if request.endpoint == 'account.profile' %}active{% endif %}">
                        <i class="bi bi-person me-2"></i> Profile
                    </a>
                    <a href="{{ url_for('main.logout') }}" class="list-group-item list-group-item-action text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            {% block account_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
