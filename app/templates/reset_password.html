{% extends "layout.html" %}

{% block title %}Reset Password - {{ app_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 mb-3 fw-bold text-center">Reset Password</h1>
                    <p class="text-muted text-center mb-4">Enter your new password below.</p>

                    {% if message_text %}
                        <div class="alert alert-info">{{ message_text }}</div>
                    {% endif %}

                    <form action="{{ url_for('main.reset_password', token=token) }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="password" class="form-label small fw-bold">New Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required minlength="8">
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label small fw-bold">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="••••••••" required minlength="8">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Update Password</button>
                        <div class="text-center">
                            <a href="{{ url_for('main.login') }}" class="small text-decoration-none">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
