{% extends "layout.html" %}

{% block title %}Forgot Password - {{ app_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 mb-3 fw-bold text-center">Forgot Password</h1>
                    <p class="text-muted text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>

                    {% if message_text %}
                        <div class="alert alert-info">{{ message_text }}</div>
                    {% endif %}

                    <form action="{{ url_for('main.forgot_password') }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-4">
                            <label for="email" class="form-label small fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Send Reset Link</button>
                        <div class="text-center">
                            <a href="{{ url_for('main.login') }}" class="small text-decoration-none">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
